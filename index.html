<nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around shadow-lg">
  <button data-tab="attendance" class="tab-btn flex-1 py-3 text-xs active">出退勤</button>
  <button data-tab="business"   class="tab-btn flex-1 py-3 text-xs">業務報告</button>
  <button data-tab="vehicle"    class="tab-btn flex-1 py-3 text-xs">各種情報管理</button>
  <button data-tab="completion" class="tab-btn flex-1 py-3 text-xs">完了報告</button>
  <button data-tab="info"       class="tab-btn flex-1 py-3 text-xs">社内情報</button>

<script>
/*********************************************************************
 * 設定値（要差し替え）
 *********************************************************************/
const LIFF_ID      = '2009892557-Iki3540A';
const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwiEXWmwwhkdy8toQ_QnCHGeaxBdOZ6UqBHeyuf0WHza61E48OPGjJvYVWucoWxihBtAA/exec';

/*********************************************************************
 * 定数
 *********************************************************************/
const BUSINESS_TYPES = ['案件業務', '営業業務', '事務業務', '移動業務'];

/*********************************************************************
 * グローバル状態
 *********************************************************************/
let userId = '';
let displayName = '';

// 出退勤
let attType = null;
let attGeo  = null;

// 業務報告
let bizStartType = null;
let bizStartGeo  = null;
let bizActionMode = null;
let bizActionGeo  = null;

// 各種情報管理
let vehicleSubType = null; // 'refuel' | 'oil' | 'condition' | 'photo'
let mstMode = null;        // 'employee' | 'vehicle'

/*********************************************************************
 * 通信
 *********************************************************************/
async function apiPost(payload) {
  if (displayName && !payload.displayName) payload.displayName = displayName;
  const res = await fetch(GAS_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  const text = await res.text();
  try { return JSON.parse(text); }
  catch (_) { return { ok:false, error:'invalid response: '+text }; }
}

/*********************************************************************
 * UI ユーティリティ
 *********************************************************************/
function showLoading(b) {
  document.getElementById('loadingMask').style.display = b ? 'flex' : 'none';
}
function showAlert(type, msg) {
  const el = document.getElementById('alert');
  el.className = 'rounded p-3 mb-4 text-sm ' +
    (type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 4000);
}
function getGeo() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('位置情報非対応'));
    navigator.geolocation.getCurrentPosition(
      p => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
      e => reject(e),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });
}

function fileToCompressedDataURL(file, maxWidth = 1280, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('画像読み込み失敗'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('ファイル読み込み失敗'));
    reader.readAsDataURL(file);
  });
}

async function fileInputToDataURL(id) {
  const f = document.getElementById(id).files[0];
  if (!f) return '';
  return await fileToCompressedDataURL(f);
}

/*********************************************************************
 * タブ切替
 *********************************************************************/
function switchTab(name) {
  document.querySelectorAll('.section').forEach(el => {
    el.classList.toggle('hidden-section', el.id !== 'tab-' + name);
  });
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  if (name === 'business')   loadBusinessStatus();
  if (name === 'vehicle')    loadVehicleList();
}
document.querySelectorAll('.tab-btn').forEach(b => {
  b.addEventListener('click', () => switchTab(b.dataset.tab));
});

/*********************************************************************
 * 出退勤
 *********************************************************************/
document.querySelectorAll('.att-type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    attType = btn.dataset.attType;
    document.querySelectorAll('.att-type-btn').forEach(b =>
      b.classList.toggle('bg-green-100', b === btn));
  });
});
document.getElementById('btnAttGeo').addEventListener('click', async () => {
  try {
    showLoading(true);
    attGeo = await getGeo();
    document.getElementById('attGeoText').textContent =
      `取得済: ${attGeo.lat.toFixed(5)}, ${attGeo.lng.toFixed(5)}`;
  } catch (e) {
    showAlert('error', '位置情報取得失敗: ' + e.message);
  } finally { showLoading(false); }
});
document.getElementById('btnAttSubmit').addEventListener('click', async () => {
  if (!attType) return showAlert('error', '区分を選択してください');
  if (!attGeo)  return showAlert('error', '位置情報を取得してください');
  const alc = document.getElementById('attAlcohol').value;
  if (alc === '' || isNaN(Number(alc))) return showAlert('error', 'アルコール値を入力');

  const btn = document.getElementById('btnAttSubmit');
  btn.disabled = true; showLoading(true);
  const res = await apiPost({
    action: 'attendance',
    userId, type: attType, lat: attGeo.lat, lng: attGeo.lng, alcohol: Number(alc)
  });
  showLoading(false); btn.disabled = false;
  if (!res.ok) return showAlert('error', res.error || '送信失敗');
  showAlert('ok', '送信しました');
  document.getElementById('attAlcohol').value = '';
  attType = null; attGeo = null;

async function loadBusinessStatus() {
  if (!userId) return;
  showLoading(true);
  const res = await apiPost({ action: 'business_status', userId });
  showLoading(false);
  const idle   = document.getElementById('bizIdle');
  const active = document.getElementById('bizActive');
  if (res.ok && res.status === 'in_progress') {
    idle.classList.add('hidden-section');
    active.classList.remove('hidden-section');
    document.getElementById('bizActiveType').textContent = res.businessType || '';
  } else {
    idle.classList.remove('hidden-section');
    active.classList.add('hidden-section');
  }
  bizActionMode = null; bizActionGeo = null;
  document.getElementById('bizActionGeoText').textContent = '未取得';
  document.getElementById('bizEndContent').value = '';
  document.getElementById('bizEndContentBlock').classList.add('hidden-section');
  document.getElementById('btnBizDropoffMode').classList.remove('bg-green-100');
  document.getElementById('btnBizEndMode').classList.remove('bg-green-100');
}

document.getElementById('btnVehicleSubmit').addEventListener('click', async () => {
  const vehicleId = document.getElementById('vehicleSelect').value;
  if (!vehicleId)      return showAlert('error', '車両を選択してください');
  if (!vehicleSubType) return showAlert('error', '項目を選択してください');

  const payload = { action: 'vehicle', userId, subType: vehicleSubType, vehicleId };
  const btn = document.getElementById('btnVehicleSubmit');

  try {
    btn.disabled = true; showLoading(true);

    if (vehicleSubType === 'refuel') {
      const liter  = document.getElementById('vRefuelLiter').value;
      const amount = document.getElementById('vRefuelAmount').value;
      const odo    = document.getElementById('vRefuelOdo').value;
      if (liter === '' || amount === '' || odo === '') {
        showLoading(false); btn.disabled = false;
        return showAlert('error', '給油量・金額・走行距離を入力してください');
      }
      payload.liter  = Number(liter);
      payload.amount = Number(amount);
      payload.odo    = Number(odo);
    } else if (vehicleSubType === 'oil') {
      const odo = document.getElementById('vOilOdo').value;
      if (odo === '') { showLoading(false); btn.disabled = false; return showAlert('error', '走行距離を入力してください'); }
      payload.odo = Number(odo);
    } else if (vehicleSubType === 'condition') {
      const sel = document.querySelector('input[name="vCondAbn"]:checked');
      if (!sel) { showLoading(false); btn.disabled = false; return showAlert('error', '異常有無を選択してください'); }
      payload.abnormal = sel.value;
      payload.note = document.getElementById('vCondNote').value.trim();
      payload.photo = await fileInputToDataURL('vCondPhoto');
    } else if (vehicleSubType === 'photo') {
      payload.photoFront      = await fileInputToDataURL('vPhotoFront');
      payload.photoBack       = await fileInputToDataURL('vPhotoBack');
      payload.photoFrontRight = await fileInputToDataURL('vPhotoFrontRight');
      payload.photoBackLeft   = await fileInputToDataURL('vPhotoBackLeft');
      if (!payload.photoFront && !payload.photoBack && !payload.photoFrontRight && !payload.photoBackLeft) {
        showLoading(false); btn.disabled = false;
        return showAlert('error', '少なくとも1枚は写真を選択してください');
      }
    }

    const res = await apiPost(payload);
    showLoading(false); btn.disabled = false;
    if (!res.ok) return showAlert('error', res.error || '送信失敗');
    showAlert('ok', '送信しました');
    document.querySelectorAll('#vSec-op input').forEach(i => {
      if (i.type === 'radio') i.checked = false; else i.value = '';
    });
    document.getElementById('vCondNote').value = '';
  } catch (e) {
    showLoading(false); btn.disabled = false;
    showAlert('error', '処理失敗: ' + e.message);
  }
});

document.getElementById('completionReceipts').addEventListener('change', () => {

document.getElementById('btnCompletionSubmit').addEventListener('click', async () => {
  const text = document.getElementById('completionText').value.trim();
  if (!text) return showAlert('error', '総括を入力してください');

  const fileInput = document.getElementById('completionReceipts');
  const files = fileInput.files ? Array.from(fileInput.files) : [];
  let receipts = [];
  const btn = document.getElementById('btnCompletionSubmit');
  btn.disabled = true; showLoading(true);
  try {
    if (files.length > 0) {
      receipts = await Promise.all(files.map(f => fileToCompressedDataURL(f)));
    }
  } catch (e) {
    showLoading(false); btn.disabled = false;
    return showAlert('error', '画像処理失敗: ' + e.message);
  }

  const res = await apiPost({ action: 'completion', userId, reportText: text, receipts });
  showLoading(false); btn.disabled = false;
  if (!res.ok) return showAlert('error', res.error || '送信失敗');
  const cnt = res.uploadedReceipts || 0;
  showAlert('ok', '送信しました' + (cnt ? `（写真${cnt}枚）` : ''));
  document.getElementById('completionText').value = '';
  fileInput.value = '';
  document.getElementById('completionReceiptsCount').textContent = '';
});

(async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      if (liff.isInClient && liff.isInClient()) {
        liff.login();
        return;
      }
      userId = 'DEBUG_USER';
      displayName = 'デバッグユーザー（ブラウザ）';
      document.getElementById('userName').textContent = displayName;
      return;
    }
    const profile = await liff.getProfile();
    userId = profile.userId;
    displayName = profile.displayName;
    document.getElementById('userName').textContent = displayName + ' さん';
  } catch (e) {
    userId = 'DEBUG_USER';
    displayName = 'デバッグユーザー';
    document.getElementById('userName').textContent = 'LIFF外（デバッグモード）';
    console.warn('LIFF init failed:', e);
  } finally {
    showLoading(false);
  }
})();
